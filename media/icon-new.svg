<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 主芯片 -->
  <rect x="20" y="20" width="60" height="60" rx="6" fill="url(#bg)" stroke="#2C5F8D" stroke-width="2"/>

  <!-- 简化的引脚 - 左右各3个 -->
  <rect x="10" y="30" width="10" height="3" fill="#FFD700" rx="1"/>
  <rect x="10" y="48" width="10" height="3" fill="#FFD700" rx="1"/>
  <rect x="10" y="66" width="10" height="3" fill="#FFD700" rx="1"/>

  <rect x="80" y="30" width="10" height="3" fill="#FFD700" rx="1"/>
  <rect x="80" y="48" width="10" height="3" fill="#FFD700" rx="1"/>
  <rect x="80" y="66" width="10" height="3" fill="#FFD700" rx="1"/>

  <!-- 简化的引脚 - 上下各3个 -->
  <rect x="30" y="10" width="3" height="10" fill="#FFD700" rx="1"/>
  <rect x="48" y="10" width="3" height="10" fill="#FFD700" rx="1"/>
  <rect x="66" y="10" width="3" height="10" fill="#FFD700" rx="1"/>

  <rect x="30" y="80" width="3" height="10" fill="#FFD700" rx="1"/>
  <rect x="48" y="80" width="3" height="10" fill="#FFD700" rx="1"/>
  <rect x="66" y="80" width="3" height="10" fill="#FFD700" rx="1"/>

  <!-- 中心圆形 -->
  <circle cx="50" cy="50" r="15" fill="#5CB85C" opacity="0.9"/>

  <!-- ASM 文字 -->
  <text x="50" y="56" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ASM</text>
</svg>
